<script src="https://st.max.ru/js/max-web-app.js"></script>

<script>
  window.onload = function() {
    window.WebApp.enableClosingConfirmation();
  }
  function ShareContact() {
    window.WebApp.requestContact().then(res => {
      savedkey = JSON.stringify(res);
      document.getElementById("output3").innerHTML = "<h2>ShareContact attempt:<br/>" + savedkey + "</h2>";
    }
    ).catch((err)=> {
      document.getElementById("output2").innerHTML = "<h2>ShareContact error:<br/>" + err + "</h2>";
    });
  }
</script>
<button onclick="ShareContact()">ShareContact</button>

<p id="output2" style="display:inline-block;"></p>
<p id="output3" style="display:inline-block;"></p>
<p id="output4" style="display:inline-block;"></p>
<p id="output5" style="display:inline-block;"></p>
